<section class="screen" id="community">
    <div class="section-top community-top community-search-top">
        <div>
            <p class="eyebrow">Community</p>
            <h2 id="communityHeading">New Delhi + NIT Delhi</h2>
            <p id="communitySubhead" class="subhead">Campus updates, study groups, project partners, and local support.
            </p>
        </div>
        <div class="community-search-bar">
            <input id="communitySearchInput" type="search" placeholder="Search posts, circles, authors...">
            <button class="button button-solid" data-action="community-search">Search</button>
        </div>
    </div>

    <div id="communityCircles" class="community-circles"></div>

    <article class="card community-quickpost">
        <button class="quickpost-input" data-action="new-community-post">
            <span class="avatar">A</span>
            <span>Create a new community post</span>
        </button>
    </article>

    <div class="community-board">
        <div class="section-heading">
            <p class="eyebrow">The Board</p>
            <h3>Latest posts from your circles</h3>
        </div>
        <div id="communityFeed" class="feed-list"></div>
    </div>

    <div class="community-shortcuts">
        <button class="shortcut-button" data-action="community-shortcut" data-filter="all">All posts</button>
        <button class="shortcut-button" data-action="community-shortcut" data-filter="flatmate">Flatmates</button>
        <button class="shortcut-button" data-action="community-shortcut" data-filter="teammate">Project
            partners</button>
        <button class="shortcut-button" data-action="community-shortcut" data-filter="help">Help requests</button>
        <button class="shortcut-button" data-action="community-shortcut" data-filter="win">Success stories</button>
    </div>
</section>

<section class="screen" id="community-post">
    <div class="section-top">
        <div>
            <p class="eyebrow">Naya post</p>
            <h2>Community post banaye</h2>
        </div>
        <button class="button button-ghost" data-action="community-back">← Back</button>
    </div>

    <article class="card post-composer-card">
        <div class="section-heading">
            <p class="eyebrow">New post</p>
            <h3>Create a professional update</h3>
        </div>

        <div id="communityComposerFields" class="post-form">
            <div class="composer-field">
                <label>What do you want to share?</label>
                <textarea id="communityPostContent" placeholder="Write your post here..."></textarea>
            </div>
        </div>

        <div class="composer-footer">
            <button class="button button-solid" data-action="community-submit-post">Post karo 🚀</button>
        </div>
    </article>
</section>
