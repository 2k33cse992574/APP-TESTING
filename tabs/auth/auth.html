<section class="screen" id="onboarding">
    <div class="onboarding-top">
        <div class="brand-mark">GigUp</div>
        <button type="button" class="button button-ghost small" data-action="skip-onboarding">Skip</button>
    </div>
    <div class="onboarding-content">
        <p class="eyebrow">Padhai ke saath kamaao</p>
        <h1 class="hero-title">Padhai ke saath kamaao</h1>
        <p class="subhead">Short gigs. Real money. Real experience.</p>

        <div class="onboarding-carousel" id="onboardingCarousel">
            <article class="onboarding-card">
                <div class="onboarding-icon">💸</div>
                <h3>₹500 – ₹10,000 per gig</h3>
            </article>
            <article class="onboarding-card">
                <div class="onboarding-icon">⚡</div>
                <h3>5–21 day tasks</h3>
            </article>
            <article class="onboarding-card">
                <div class="onboarding-icon">🏆</div>
                <h3>Build a portfolio</h3>
            </article>
        </div>

        <div class="onboarding-actions">
            <button type="button" class="button button-solid" data-screen="student-auth">Start Earning →</button>
        </div>
    </div>
</section>

<section class="screen" id="student-auth">
    <div class="auth-shell">
        <div class="auth-header">
            <button type="button" data-screen="onboarding">← Back</button>
            <p class="eyebrow">Student Auth</p>
        </div>
        <div class="auth-progress">
            <span class="auth-step-indicator active">1</span>
            <span class="auth-step-indicator">2</span>
        </div>

        <div class="auth-card" id="student-auth-step1">
            <label>Apna number daalo</label>
            <div class="phone-input">
                <span>+91</span>
                <input id="studentPhone" type="tel" maxlength="10" placeholder="1234567890">
            </div>
            <button type="button" class="button button-solid" data-action="student-send-otp">OTP bhejo</button>
            <p class="auth-note">Phone OTP se login karein. No password.</p>
        </div>

        <div class="auth-card hidden" id="student-auth-step2">
            <p>OTP bheja gaya hai +91 <span id="studentPhoneDisplay"></span></p>
            <div class="otp-row">
                <input class="otp-box" id="studentOtp1" maxlength="1" type="tel">
                <input class="otp-box" id="studentOtp2" maxlength="1" type="tel">
                <input class="otp-box" id="studentOtp3" maxlength="1" type="tel">
                <input class="otp-box" id="studentOtp4" maxlength="1" type="tel">
            </div>
            <button type="button" class="button button-solid" data-action="student-verify-otp">Verify OTP</button>
        </div>
    </div>
</section>
