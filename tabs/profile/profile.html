<section class="screen" id="profile">
    <div class="section-top">
        <div>
            <p class="eyebrow">Career passport</p>
            <h2>Your verified student profile and growth tracker.</h2>
        </div>
        <button class="button button-solid" data-action="upgrade">Upgrade plan</button>
    </div>

    <div class="profile-grid">
        <article class="card profile-card">
            <div class="profile-avatar">A</div>
            <div>
                <h3 id="profileName">Ananya R.</h3>
                <p id="profileCollege">NIT Delhi • 2nd Year</p>
                <div class="rating-pill"><span id="ratingValueProfile">0.0</span> ★</div>
            </div>
        </article>

        <article class="card">
            <div class="card-title">Skills</div>
            <div id="skillTags" class="tag-list"></div>
        </article>

        <article class="card">
            <div class="card-title">Recent work</div>
            <ul id="projectList" class="simple-list"></ul>
        </article>
    </div>

    <section class="panel-card panel-light">
        <div class="panel-heading">
            <h2>Career guidance</h2>
            <p class="panel-copy">Based on your activity, StudentOS suggests your next path.</p>
        </div>
        <div class="career-pill" id="careerPath">UI/UX Design Path</div>
    </section>
</section>
