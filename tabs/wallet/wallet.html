<section class="screen" id="wallet">
    <div class="section-top">
        <div>
            <p class="eyebrow">Wallet</p>
            <h2>Manage your student money and earnings.</h2>
        </div>
        <button class="button button-solid" data-action="topup">Top up wallet</button>
    </div>

    <div class="panel-grid">
        <article class="card wallet-card">
            <div class="card-title">Available balance</div>
            <p class="stat">₹<span id="walletBalanceLarge">0</span></p>
            <p class="meta">Use this for food, housing, and career services.</p>
        </article>
        <article class="card">
            <div class="card-title">Upcoming payout</div>
            <p class="stat">₹<span id="pendingPayout">0</span></p>
            <p class="meta">Payments released via escrow after task approval.</p>
        </article>
    </div>

    <section class="panel-card">
        <div class="panel-heading">
            <h2>Recent Transactions</h2>
        </div>
        <div id="transactionList" class="transaction-list"></div>
    </section>
</section>
