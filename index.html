<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudentOS — Modular Distributed Version</title>

  <!-- Shared Styles -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;800&family=Barlow:wght@400;600;700&family=Barlow+Condensed:wght@600;700&display=swap"
    rel="stylesheet">

  <!-- Shared CSS -->
  <link rel="stylesheet" href="shared/design-system.css">
  <link rel="stylesheet" href="shared/app-shell.css">

  <!-- Tab Specific Styles -->
  <link rel="stylesheet" href="tabs/auth/auth.css">
  <link rel="stylesheet" href="tabs/dashboard/dashboard.css">
  <link rel="stylesheet" href="tabs/gigs/gigs.css">
  <link rel="stylesheet" href="tabs/community/community.css">
  <link rel="stylesheet" href="tabs/housing/housing.css">
  <link rel="stylesheet" href="tabs/wallet/wallet.css">
  <link rel="stylesheet" href="tabs/profile/profile.css">

  <link rel="manifest" href="manifest.webmanifest">
</head>

<body>
  <div class="app-shell">
    <header class="app-topbar">
      <div class="brand-block">
        <div>
          <h1 class="brand-mark">StudentOS</h1>
          <p class="brand-sub">Earn, Live, Spend, Grow</p>
        </div>
        <button class="premium-pill" id="premiumToggle">Free</button>
      </div>

      <nav class="app-nav" aria-label="Primary navigation">
        <button type="button" data-screen="dashboard" class="nav-item active">Dashboard</button>
        <button type="button" data-screen="gigs" class="nav-item">Gigs</button>
        <button type="button" data-screen="community" class="nav-item">Community</button>
        <button type="button" data-screen="housing" class="nav-item">Housing</button>
        <button type="button" data-screen="wallet" class="nav-item">Wallet</button>
        <button type="button" data-screen="profile" class="nav-item">Profile</button>
      </nav>
    </header>

    <main class="app-main" id="app-content">
      <!-- Tab content will be loaded here -->
      <div id="loader-placeholder" style="text-align: center; padding: 5rem; color: var(--muted);">
        <p>Loading StudentOS...</p>
      </div>
    </main>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <!-- Shared Scripts -->
  <script src="shared/state.js"></script>
  <script src="shared/utils.js"></script>

  <!-- Tab Specific Logic -->
  <script src="tabs/auth/auth.js"></script>
  <script src="tabs/dashboard/dashboard.js"></script>
  <script src="tabs/gigs/gigs.js"></script>
  <script src="tabs/community/community.js"></script>
  <script src="tabs/housing/housing.js"></script>
  <script src="tabs/wallet/wallet.js"></script>
  <script src="tabs/profile/profile.js"></script>

  <!-- Main Orchestrator -->
  <script src="shared/app.js"></script>

  <!-- Content Inserter (Wait for DOM then inject fragments) -->
  <script>
    async function loadTabs() {
      const tabs = [
        'auth/auth.html',
        'dashboard/dashboard.html',
        'gigs/gigs.html',
        'community/community.html',
        'housing/housing.html',
        'wallet/wallet.html',
        'profile/profile.html'
      ];

      const appContent = document.getElementById('app-content');
      appContent.innerHTML = ''; // Clear placeholder

      for (const tab of tabs) {
        try {
          const response = await fetch('tabs/' + tab);
          const html = await response.text();
          appContent.insertAdjacentHTML('beforeend', html);
        } catch (e) {
          console.error('Failed to load tab:', tab, e);
        }
      }

      // Re-initialize app after loading HTML
      if (typeof initApp === 'function') initApp();
    }

    // Start loading
    loadTabs();
  </script>
</body>

</html>
